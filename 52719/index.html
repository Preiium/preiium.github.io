    <title>Trip to Australia</title>
    <style>
        /* Style for the circular button */
        .circle-button {
            display: inline-block;
            width: 50px;
            height: 50px;
            background-color: #65a5f7; /* Change this to your preferred background color */
            border-radius: 50%;
            text-align: center;
            line-height: 50px;
            color: #ffffff; /* Change this to your preferred text color */
            text-decoration: none;
            font-weight: bold;
        }

        /* Hover effect */
        .circle-button:hover {
            background-color: #5891db; /* Change this to the hover background color */
        }
    </style>
</head>
<body>

    <!-- Circular button -->
    <a href="day-1" class="circle-button">Day 1</a>

</body>
