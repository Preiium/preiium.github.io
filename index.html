<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Button</title>
    <style>
        /* Style for the circular button */
        .circle-button {
            display: inline-block;
            width: 50px;
            height: 50px;
            background-color: #3498db; /* Change this to your preferred background color */
            border-radius: 50%;
            text-align: center;
            line-height: 50px;
            color: #ffffff; /* Change this to your preferred text color */
            text-decoration: none;
            font-weight: bold;
        }

        /* Hover effect */
        .circle-button:hover {
            background-color: #2980b9; /* Change this to the hover background color */
        }
    </style>
</head>
<body>

    <!-- Circular button -->
    <a href="day-1" class="circle-button">Day 1</a>

</body>
</html>
